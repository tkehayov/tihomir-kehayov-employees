<section class="upload-section">
  <button mat-raised-button color="primary" (click)="fileInput.click()">
    <mat-icon>upload</mat-icon> Upload
  </button>

  <input #fileInput type="file" style="display: none" (change)="uploadFile($event)" />

  @if (selectedFileName()) {
    <p class="result-text">Selected File: {{ selectedFileName() }}</p>
  }
</section>

@if (responseData()) {
  <section class="response-card">
    <h2>Employees</h2>

    <div class="response-row">
      <label>Employee ID #1</label>
      <div>{{ responseData()?.employeeIdOne }}</div>
    </div>

    <div class="response-row">
      <label>Employee ID #2</label>
      <div>{{ responseData()?.employeeIdTwo }}</div>
    </div>

    <div class="response-row">
      <label>Project ID</label>
      <div>{{ responseData()?.projectId }}</div>
    </div>

    <div class="response-row">
      <label>Days Together</label>
      <div>{{ responseData()?.daysTogether }}</div>
    </div>
  </section>
}
